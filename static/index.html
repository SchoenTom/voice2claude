<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="voice2claude">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050810">
<title>voice2claude</title>
<style>
:root{
  --bg-void:#050810; --bg-surface:#0b0f1c; --bg-raised:#111827;
  --aurora-1:#0d4a6e; --aurora-2:#0a2e52; --aurora-3:#1a0a3e;
  --glow-teal:#00c6ff; --glow-violet:#a855f7; --glow-emerald:#10d98e; --glow-red:#ef4444;
  --mic-mid:#0090c8;
  --text-primary:#f0f4ff; --text-secondary:#8ba4c8; --text-muted:#4a6080; --text-accent:#00c6ff;
  --border-subtle:rgba(255,255,255,0.06);
  --radius-sm:10px; --radius-md:16px; --radius-lg:24px; --radius-xl:32px;
  --font-ui:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --font-serif:'New York','Georgia','Times New Roman',serif;
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ width:100%; min-height:100%; background:var(--bg-void); color:var(--text-primary);
  font-family:var(--font-ui); font-size:16px; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  overscroll-behavior:none; }
body::before{ content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(13,74,110,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 0%, rgba(168,85,247,0.3) 0%, transparent 50%),
    radial-gradient(ellipse 100% 40% at 50% 100%, rgba(26,10,62,0.7) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 10% 80%, rgba(16,217,142,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 50% 70% at 90% 60%, rgba(42,14,82,0.4) 0%, transparent 50%),
    var(--bg-void);
  animation:aurora-shift 18s ease-in-out infinite alternate; }
body::after{ content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 90% 30% at 60% 30%, rgba(0,198,255,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 0% 50%, rgba(0,198,255,0.08) 0%, transparent 50%);
  animation:aurora-shift-b 22s ease-in-out infinite alternate; }
@keyframes aurora-shift{ 0%{opacity:1;transform:scale(1) translate(0,0)} 33%{opacity:.85;transform:scale(1.04) translate(-8px,12px)} 66%{opacity:.95;transform:scale(.97) translate(10px,-6px)} 100%{opacity:1;transform:scale(1.02) translate(-4px,8px)} }
@keyframes aurora-shift-b{ 0%{opacity:.6;transform:scale(1) translate(0,0)} 50%{opacity:1;transform:scale(1.06) translate(12px,-10px)} 100%{opacity:.7;transform:scale(.96) translate(-10px,14px)} }

.app{ position:relative; z-index:1; max-width:390px; margin:0 auto;
  padding:0 0 calc(env(safe-area-inset-bottom,0px) + 36px); padding-top:env(safe-area-inset-top,0px);
  display:flex; flex-direction:column; gap:14px; }

.header{ position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 12px; gap:10px;
  background:linear-gradient(180deg, rgba(5,8,16,0.94) 0%, rgba(5,8,16,0.6) 72%, transparent 100%);
  backdrop-filter:blur(18px) saturate(1.4); -webkit-backdrop-filter:blur(18px) saturate(1.4); }
.target-arrow{ color:var(--text-muted); font-size:10px; flex:none; opacity:.8; }
.brand-name{ font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:lowercase; color:var(--text-secondary); flex:none; }
.brand-name span{ color:var(--glow-teal); text-shadow:0 0 12px rgba(0,198,255,0.7); }
.session-pill{ display:flex; align-items:center; gap:7px; min-width:0;
  background:rgba(0,198,255,0.08); border:1px solid rgba(0,198,255,0.18); border-radius:100px;
  padding:5px 12px 5px 9px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.status-dot{ width:7px; height:7px; border-radius:50%; background:var(--glow-teal); flex-shrink:0;
  box-shadow:0 0 8px var(--glow-teal), 0 0 16px rgba(0,198,255,0.5);
  animation:pulse-dot 2.4s ease-in-out infinite; transition:background .3s, box-shadow .3s; }
.status-dot.warn{ background:var(--glow-warm,#f59e0b); box-shadow:0 0 8px #f59e0b; }
.status-dot.bad{ background:var(--glow-red); box-shadow:0 0 8px var(--glow-red); }
@keyframes pulse-dot{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.65;transform:scale(.85)} }
.session-name{ font-size:11.5px; font-weight:500; color:var(--text-accent); white-space:nowrap;
  min-width:0; overflow:hidden; text-overflow:ellipsis; }
.time-display{ font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; flex:none; }

.section-label{ font-size:10.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text-muted); padding:0 20px; margin-bottom:-6px; display:flex; justify-content:space-between; }
.section-label .refresh{ color:var(--text-accent); opacity:.8; }

.mic-zone{ padding:0 20px; }
.mic-card{ position:relative; background:linear-gradient(145deg, rgba(17,24,39,0.9), rgba(11,15,28,0.95));
  border:1px solid rgba(0,198,255,0.12); border-radius:var(--radius-xl); padding:30px 20px 26px;
  display:flex; flex-direction:column; align-items:center; gap:22px; overflow:hidden;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(0,198,255,0.04), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06); }
.mic-card::before{ content:''; position:absolute; width:280px; height:280px; top:50%; left:50%;
  transform:translate(-50%,-44%); border-radius:50%;
  background:radial-gradient(circle, rgba(0,198,255,0.12) 0%, rgba(0,144,200,0.06) 40%, transparent 70%);
  animation:orb-ambient 4s ease-in-out infinite alternate; pointer-events:none; }
@keyframes orb-ambient{ 0%{opacity:.7;transform:translate(-50%,-44%) scale(1)} 100%{opacity:1;transform:translate(-50%,-44%) scale(1.15)} }
.waveform{ display:flex; align-items:center; gap:3px; height:28px; }
.waveform-bar{ width:3px; border-radius:2px; background:linear-gradient(to top, var(--mic-mid), var(--glow-teal));
  transform-origin:bottom center; animation:wave-idle 1.6s ease-in-out infinite; opacity:.5; height:18px; }
.waveform-bar:nth-child(1){height:8px;animation-delay:0s}.waveform-bar:nth-child(2){height:14px;animation-delay:.1s}
.waveform-bar:nth-child(3){height:20px;animation-delay:.2s}.waveform-bar:nth-child(4){height:10px;animation-delay:.3s}
.waveform-bar:nth-child(5){height:22px;animation-delay:.15s}.waveform-bar:nth-child(6){height:16px;animation-delay:.25s}
.waveform-bar:nth-child(7){height:26px;animation-delay:.05s}.waveform-bar:nth-child(8){height:18px;animation-delay:.35s}
.waveform-bar:nth-child(9){height:12px;animation-delay:.2s}.waveform-bar:nth-child(10){height:24px;animation-delay:.1s}
.waveform-bar:nth-child(11){height:8px;animation-delay:.3s}.waveform-bar:nth-child(12){height:16px;animation-delay:0s}
.waveform-bar:nth-child(13){height:10px;animation-delay:.4s}
@keyframes wave-idle{ 0%,100%{transform:scaleY(0.5);opacity:.4} 50%{transform:scaleY(1);opacity:.7} }
.mic-card.rec .waveform-bar{ animation:none; }

.mic-orb-wrap{ position:relative; width:112px; height:112px; cursor:pointer; user-select:none; }
.mic-halo{ position:absolute; inset:-18px; border-radius:50%; border:1.5px solid rgba(0,198,255,0.15); animation:halo-breathe 3s ease-in-out infinite; }
.mic-halo-2{ position:absolute; inset:-9px; border-radius:50%; border:1px solid rgba(0,198,255,0.22); animation:halo-breathe 3s ease-in-out infinite .4s; }
@keyframes halo-breathe{ 0%,100%{opacity:.3;transform:scale(0.97)} 50%{opacity:.8;transform:scale(1.03)} }
.mic-glow-ring{ position:absolute; inset:0; border-radius:50%; animation:glow-breathe 3s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(0,198,255,0.25), 0 0 20px rgba(0,198,255,0.35), 0 0 50px rgba(0,198,255,0.18), 0 0 80px rgba(0,144,200,0.1); }
@keyframes glow-breathe{
  0%,100%{ box-shadow:0 0 0 3px rgba(0,198,255,0.2),0 0 18px rgba(0,198,255,0.3),0 0 40px rgba(0,198,255,0.12),0 0 70px rgba(0,144,200,0.07); }
  50%{ box-shadow:0 0 0 4px rgba(0,198,255,0.4),0 0 32px rgba(0,198,255,0.55),0 0 70px rgba(0,198,255,0.28),0 0 110px rgba(0,144,200,0.18); } }
.mic-orb{ position:absolute; inset:0; border-radius:50%; overflow:hidden; animation:orb-pulse 3s ease-in-out infinite;
  background:radial-gradient(circle at 38% 32%, rgba(0,230,255,0.95) 0%, rgba(0,180,230,0.85) 20%, rgba(0,120,190,0.8) 45%, rgba(0,70,130,0.9) 70%, rgba(0,30,80,1) 100%);
  box-shadow:inset 0 2px 8px rgba(255,255,255,0.25), inset 0 -4px 12px rgba(0,0,40,0.4), 0 4px 24px rgba(0,120,200,0.5); }
.mic-orb::before{ content:''; position:absolute; top:14%; left:20%; width:36%; height:28%; border-radius:50%; transform:rotate(-20deg);
  background:radial-gradient(ellipse, rgba(255,255,255,0.45) 0%, transparent 70%); }
@keyframes orb-pulse{ 0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.03);filter:brightness(1.1)} }
.mic-card.rec .mic-orb{ background:radial-gradient(circle at 38% 32%, rgba(255,150,150,0.95) 0%, rgba(240,90,90,0.85) 30%, rgba(150,30,40,0.95) 75%, rgba(60,10,20,1) 100%); }
.mic-icon{ position:absolute; top:50%; left:50%; transform:translate(-50%,-52%); width:32px; height:32px;
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.8)) drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
.mic-orb-wrap:active .mic-orb{ transform:scale(0.95); filter:brightness(1.2); }
.mic-label{ font-size:13.5px; font-weight:500; color:var(--text-secondary); letter-spacing:.03em; }
.mic-label b{ color:var(--text-primary); font-weight:600; }
.mic-sublabel{ font-size:10.5px; color:var(--text-muted); letter-spacing:.04em; }

.transcript-zone,.sessions-zone,.keypad-zone,.nav-zone{ padding:0 20px; }
.transcript-card{ background:linear-gradient(145deg, rgba(17,24,39,0.85), rgba(11,15,28,0.9)); border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg); overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); }
.transcript-header{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px 8px; border-bottom:1px solid var(--border-subtle); }
.transcript-title{ font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }
.direct-send-row{ display:flex; align-items:center; gap:6px; }
.direct-send-label{ font-size:10.5px; color:var(--text-muted); }
.toggle{ position:relative; width:34px; height:20px; flex:none; }
.toggle input{ opacity:0; width:0; height:0; position:absolute; }
.toggle-track{ position:absolute; inset:0; background:rgba(255,255,255,0.1); border-radius:10px; transition:background .25s; border:1px solid rgba(255,255,255,0.08); }
.toggle input:checked + .toggle-track{ background:rgba(0,198,255,0.35); border-color:rgba(0,198,255,0.4); }
.toggle-thumb{ position:absolute; top:2px; left:2px; width:15px; height:15px; background:#fff; border-radius:50%; transition:transform .25s, background .25s; box-shadow:0 1px 4px rgba(0,0,0,0.4); pointer-events:none; }
.toggle input:checked ~ .toggle-thumb{ transform:translateX(14px); background:var(--glow-teal); box-shadow:0 0 8px rgba(0,198,255,0.6); }
.transcript-text{ width:100%; min-height:96px; max-height:240px; padding:14px 16px; background:transparent; border:none; outline:none;
  color:var(--text-primary); font-family:var(--font-serif); font-size:15.5px; line-height:1.6; resize:none; -webkit-appearance:none; }
.transcript-text::placeholder{ color:var(--text-muted); font-style:italic; }
.transcript-actions{ display:flex; align-items:center; justify-content:space-between; padding:10px 14px 14px; border-top:1px solid var(--border-subtle); gap:8px; }
.btn-clear{ font-size:12.5px; font-weight:500; color:var(--text-muted); background:rgba(255,255,255,0.05); border:1px solid var(--border-subtle); border-radius:100px; padding:8px 16px; min-height:36px; -webkit-appearance:none; }
.btn-clear:active{ background:rgba(255,255,255,0.12); color:var(--text-primary); }
.btn-send{ font-size:13.5px; font-weight:600; color:#000c1a; background:linear-gradient(135deg,#00d4ff 0%,#0090e0 60%,#0060c0 100%); border:none; border-radius:100px; padding:10px 22px; min-height:40px; letter-spacing:.02em; flex-shrink:0; -webkit-appearance:none;
  box-shadow:0 2px 12px rgba(0,198,255,0.45), 0 0 24px rgba(0,198,255,0.2), inset 0 1px 0 rgba(255,255,255,0.3); transition:transform .15s; }
.btn-send:active{ transform:scale(0.96); }

.sessions-card{ background:linear-gradient(145deg, rgba(17,24,39,0.8), rgba(11,15,28,0.85)); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.session-row{ display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border-subtle); cursor:pointer; transition:background .2s; min-height:52px; position:relative; }
.session-row:last-child{ border-bottom:none; }
.session-row:active{ background:rgba(255,255,255,0.04); }
.session-row.active{ background:linear-gradient(90deg, rgba(0,198,255,0.07) 0%, transparent 100%); }
.session-row.active::before{ content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px; background:linear-gradient(to bottom, var(--glow-teal), var(--mic-mid)); border-radius:0 2px 2px 0; box-shadow:0 0 8px rgba(0,198,255,0.6); }
.session-icon{ width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.session-icon.active-icon{ background:rgba(0,198,255,0.12); border:1px solid rgba(0,198,255,0.2); box-shadow:0 0 12px rgba(0,198,255,0.2); color:var(--glow-teal); }
.session-icon.idle-icon{ background:rgba(255,255,255,0.05); border:1px solid var(--border-subtle); color:var(--text-muted); }
.session-icon.warn-icon{ background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3); color:#f59e0b; }
.session-icon.working-icon{ background:rgba(0,198,255,0.12); border:1px solid rgba(0,198,255,0.28); color:var(--glow-teal); animation:pulse-dot 1.3s ease-in-out infinite; }
.session-icon.ready-icon{ background:rgba(245,158,11,0.14); border:1px solid rgba(245,158,11,0.38); color:#f5b042; box-shadow:0 0 14px rgba(245,158,11,0.28); }
.session-row-meta.ready-meta{ color:#f5b042; }
.session-info{ flex:1; min-width:0; }
.session-row-name{ font-size:13.5px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.session-row.active .session-row-name{ color:var(--glow-teal); }
.session-row-name.wrap{ white-space:normal; color:#f59e0b; }
.session-row-meta{ font-size:11px; color:var(--text-muted); }
.session-arrow{ color:var(--text-muted); font-size:12px; opacity:.5; flex:none; }
.sessions-empty{ padding:16px; font-size:13px; color:var(--text-muted); text-align:center; }

.keypad-card{ background:linear-gradient(145deg, rgba(17,24,39,0.8), rgba(11,15,28,0.85)); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:16px; display:flex; flex-direction:column; gap:8px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.keypad-row{ display:grid; gap:8px; }
.keypad-row-4{ grid-template-columns:repeat(4,minmax(0,1fr)); }
.keypad-row-3{ grid-template-columns:repeat(3,minmax(0,1fr)); }
.key{ display:flex; align-items:center; justify-content:center; min-height:46px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--border-subtle); background:rgba(255,255,255,0.05); color:var(--text-primary); letter-spacing:.01em; transition:background .12s, transform .1s, box-shadow .12s; -webkit-appearance:none; position:relative; overflow:hidden; padding:0 6px; text-align:center; line-height:1.2; }
.key::after{ content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 60%); pointer-events:none; }
.key:active{ transform:scale(0.93); background:rgba(255,255,255,0.1); }
.key-enter{ background:rgba(0,198,255,0.1); border-color:rgba(0,198,255,0.22); color:var(--glow-teal); box-shadow:0 0 12px rgba(0,198,255,0.1); }
.key-enter:active{ box-shadow:0 0 24px rgba(0,198,255,0.35); background:rgba(0,198,255,0.2); }
.key-stop{ background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.25); color:#f87171; box-shadow:0 0 10px rgba(239,68,68,0.1); }
.key-stop:active{ background:rgba(239,68,68,0.25); box-shadow:0 0 20px rgba(239,68,68,0.4); }
.key-yes{ background:rgba(16,217,142,0.08); border-color:rgba(16,217,142,0.2); color:var(--glow-emerald); }
.key-no{ background:rgba(239,68,68,0.07); border-color:rgba(239,68,68,0.18); color:#fca5a5; }
.key-mode{ background:rgba(168,85,247,0.08); border-color:rgba(168,85,247,0.2); color:#c084fc; font-size:11.5px; }
.key.flash{ animation:keyflash .45s ease; }
@keyframes keyflash{ 0%{ background:rgba(0,198,255,0.3); border-color:var(--glow-teal); } 100%{} }

.nav-card{ background:linear-gradient(145deg, rgba(17,24,39,0.75), rgba(11,15,28,0.8)); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:10px; display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:6px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
.nav-key{ display:flex; align-items:center; justify-content:center; min-height:42px; border-radius:8px; font-size:10.5px; font-weight:500; cursor:pointer; border:1px solid var(--border-subtle); background:rgba(255,255,255,0.04); color:var(--text-secondary); text-align:center; padding:4px 2px; line-height:1.2; transition:background .12s, transform .1s; -webkit-appearance:none; }
.nav-key:active{ transform:scale(0.91); background:rgba(255,255,255,0.1); color:var(--text-primary); }

#toast{ position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 26px); left:50%; transform:translateX(-50%) translateY(16px);
  background:linear-gradient(135deg, rgba(16,217,142,0.18), rgba(0,180,100,0.12)); border:1px solid rgba(16,217,142,0.35); border-radius:100px;
  padding:11px 20px; font-size:13px; font-weight:500; color:var(--glow-emerald); letter-spacing:.02em;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:0 0 20px rgba(16,217,142,0.2), 0 8px 32px rgba(0,0,0,0.5);
  z-index:100; max-width:86vw; text-align:center; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#toast.err{ background:linear-gradient(135deg, rgba(239,68,68,0.18), rgba(180,40,40,0.12)); border-color:rgba(239,68,68,0.4); color:#fca5a5; box-shadow:0 0 20px rgba(239,68,68,0.2), 0 8px 32px rgba(0,0,0,0.5); }
::-webkit-scrollbar{ width:2px; } ::-webkit-scrollbar-thumb{ background:rgba(0,198,255,0.2); border-radius:2px; }
</style>
</head>
<body>
<div id="toast"></div>
<div class="app">

  <div class="header">
    <div class="brand-name">voice<span>2claude</span></div>
    <div class="session-pill">
      <div class="status-dot" id="dot"></div>
      <span class="target-arrow">▸</span>
      <div class="session-name" id="tname">verbinde…</div>
    </div>
    <div class="time-display" id="clock">––:––</div>
  </div>

  <div class="mic-zone">
    <div class="mic-card" id="miccard">
      <div class="waveform">
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
      </div>
      <div class="mic-orb-wrap" id="mic">
        <div class="mic-halo"></div><div class="mic-halo-2"></div><div class="mic-glow-ring"></div>
        <div class="mic-orb">
          <svg class="mic-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="11" y="4" width="10" height="16" rx="5" fill="white" fill-opacity="0.92"/>
            <path d="M6 16C6 22.627 10.477 28 16 28C21.523 28 26 22.627 26 16" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" stroke-opacity="0.9"/>
            <line x1="16" y1="28" x2="16" y2="32" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.9"/>
            <line x1="11" y1="32" x2="21" y2="32" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.9"/>
          </svg>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div class="mic-label" id="miclabel"><b>Tippen</b> zum Sprechen</div>
        <div class="mic-sublabel">Diktat bleibt lokal auf deinem Mac</div>
      </div>
    </div>
  </div>

  <div class="transcript-zone">
    <div class="transcript-card">
      <div class="transcript-header">
        <div class="transcript-title">Transkript</div>
        <div class="direct-send-row">
          <span class="direct-send-label">Direkt senden</span>
          <label class="toggle"><input type="checkbox" id="direct"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
        </div>
      </div>
      <textarea class="transcript-text" id="text" placeholder="Gesprochener Text erscheint hier — editierbar. Mehrmals sprechen ergänzt."></textarea>
      <div class="transcript-actions">
        <button class="btn-clear" id="clear">Leeren</button>
        <button class="btn-send" id="send">Senden →</button>
      </div>
    </div>
  </div>

  <div class="section-label"><span id="sesshead">Sessions</span><span class="refresh" id="refresh">aktualisieren</span></div>
  <div class="sessions-zone"><div class="sessions-card" id="sessions"><div class="sessions-empty">lade…</div></div></div>

  <div class="section-label"><span>Fernsteuerung</span></div>
  <div class="keypad-zone">
    <div class="keypad-card">
      <div class="keypad-row keypad-row-4">
        <button class="key key-enter" data-key="enter">Enter ↵</button>
        <button class="key" data-key="escape">Esc</button>
        <button class="key key-stop" data-key="ctrl-c">■ Stop</button>
        <button class="key key-mode" data-key="shift-tab">Modus ⇧⇥</button>
      </div>
      <div class="keypad-row keypad-row-4">
        <button class="key key-yes" data-key="y">Ja (y)</button>
        <button class="key key-no" data-key="n">Nein (n)</button>
        <button class="key" data-key="up">↑</button>
        <button class="key" data-key="down">↓</button>
      </div>
      <div class="keypad-row keypad-row-3">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
      </div>
    </div>
  </div>

  <div class="section-label"><span>Navigation</span></div>
  <div class="nav-zone">
    <div class="nav-card">
      <button class="nav-key" data-key="ctrl+left">App ←</button>
      <button class="nav-key" data-key="ctrl+right">App →</button>
      <button class="nav-key" data-key="ctrl+up">Mission</button>
      <button class="nav-key" data-key="ctrl+down">Exposé</button>
      <button class="nav-key" data-act="prev">◂ Fenster</button>
      <button class="nav-key" data-act="next">Fenster ▸</button>
    </div>
  </div>

</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const $ = s => document.querySelector(s);
const mic=$('#mic'), miccard=$('#miccard'), ta=$('#text'), miclabel=$('#miclabel'),
      dot=$('#dot'), tname=$('#tname'), toastEl=$('#toast'), direct=$('#direct');
const bars=[...document.querySelectorAll('.waveform-bar')];
let recording=false, rec, chunks=[], stream, audioCtx, analyser, raf, wakeLock, sessionList=[];

async function api(path, opts){
  const sep = path.includes('?') ? '&' : '?';
  return fetch(path + (TOKEN ? (sep+'token='+encodeURIComponent(TOKEN)) : ''), opts);
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastT;
function toast(msg, err){
  toastEl.textContent=msg; toastEl.className='show'+(err?' err':'');
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.className=toastEl.className.replace('show','').trim(), 2400);
}
function clock(){ const d=new Date(); $('#clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
clock(); setInterval(clock, 15000);

/* ---- Status ---- */
async function poll(){
  try{
    const j = await (await api('/status')).json();
    const acc=j.accessibility, term=j.is_terminal, app=j.frontmost?.app||'?', title=j.frontmost?.title;
    if(j.backend==='tmux'){ dot.className='status-dot'; tname.textContent='tmux: '+j.tmux; }
    else if(!acc){ dot.className='status-dot bad'; tname.textContent='Bedienungshilfen aus'; }
    else if(term){ dot.className='status-dot'; tname.textContent=title||app; }
    else { dot.className='status-dot warn'; tname.textContent=app+' (kein Terminal)'; }
  }catch(e){ dot.className='status-dot bad'; tname.textContent='Mac nicht erreichbar'; }
}

/* ---- Sessions ---- */
let needsAuto=false;
async function loadSessions(){
  try{
    const j = await (await api('/sessions')).json();
    needsAuto = !!j.needs_automation;
    sessionList=(j.sessions||[]).filter(s=>s.is_claude).concat((j.sessions||[]).filter(s=>!s.is_claude));
    renderSessions();
  }catch(e){ $('#sessions').innerHTML='<div class="sessions-empty">Sessions nicht ladbar</div>'; }
}
function renderSessions(){
  const box=$('#sessions'); box.innerHTML='';
  if(needsAuto){
    const r=document.createElement('div'); r.className='session-row';
    r.innerHTML='<div class="session-icon warn-icon">!</div><div class="session-info"><div class="session-row-name wrap">Bedienungshilfen aktivieren → dann erscheinen alle Sessions</div></div>';
    r.onclick=()=>toast('Systemeinstellungen → Datenschutz → Bedienungshilfen → voice2claude');
    box.appendChild(r);
  }
  if(!sessionList.length && !needsAuto){ box.innerHTML='<div class="sessions-empty">keine Terminal-Fenster</div>'; updateTally(); return; }
  sessionList.forEach(s=>{
    const st=s.state||'idle';
    const r=document.createElement('div'); r.className='session-row'+(s.front?' active':'');
    const ic = s.front?'active-icon':(st==='working'?'working-icon':(st==='ready'?'ready-icon':'idle-icon'));
    const glyph = s.is_claude?'✦':'›';
    let meta='terminal', mcls='';
    if(s.front) meta='aktiv';
    else if(st==='working') meta='arbeitet…';
    else if(st==='ready'){ meta='bereit'; mcls=' ready-meta'; }
    else if(s.is_claude) meta='ruht';
    r.innerHTML='<div class="session-icon '+ic+'">'+glyph+'</div><div class="session-info"><div class="session-row-name">'
      +esc(s.title)+'</div><div class="session-row-meta'+mcls+'">'+meta+'</div></div><div class="session-arrow">›</div>';
    r.onclick=()=>selectSession(s);
    box.appendChild(r);
  });
  updateTally();
}
function updateTally(){
  const cl=sessionList.filter(s=>s.is_claude);
  const w=cl.filter(s=>s.state==='working').length;
  const rdy=cl.filter(s=>s.state==='ready' && !s.front).length;
  const h=$('#sesshead'); if(!h) return;
  if(!cl.length){ h.textContent='Sessions'; return; }
  let t='Sessions';
  if(w||rdy){ t='Sessions · '+(w?(w+' arbeitet'):'')+((w&&rdy)?' · ':'')+(rdy?(rdy+' bereit'):''); }
  h.textContent=t;
}
async function selectSession(s){
  sessionList.forEach(x=>{ x.front=(x.id===s.id && x.tab===s.tab); });   // optimistisch
  renderSessions(); tname.textContent=s.title; dot.className='status-dot';
  try{
    const res=await (await api('/select',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:s.id,tab:s.tab})})).json();
    if(!res.ok) toast('Wechsel fehlgeschlagen', true);
  }catch(e){ toast('Fehler: '+e.message, true); }
  setTimeout(()=>{poll();loadSessions();}, 180);
}
function cycleWindow(dir){
  if(!sessionList.length){ toast('keine Sessions'); return; }
  let i=sessionList.findIndex(s=>s.front);
  i = i<0 ? 0 : (i+(dir==='next'?1:-1)+sessionList.length)%sessionList.length;
  selectSession(sessionList[i]);
}

/* ---- Aufnahme (tap-to-toggle) + Live-Wellenform ---- */
function pickMime(){
  const C=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac','audio/ogg'];
  if(window.MediaRecorder && MediaRecorder.isTypeSupported) for(const t of C) if(MediaRecorder.isTypeSupported(t)) return t;
  return '';
}
function levelLoop(){
  if(!analyser) return;
  const data=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data);
  bars.forEach((b,i)=>{ const v=data[Math.floor(i/bars.length*data.length)]/255;
    b.style.transform='scaleY('+(0.25+v*1.35)+')'; b.style.opacity=(0.5+v*0.5).toString(); });
  raf=requestAnimationFrame(levelLoop);
}
async function startRec(){
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ toast('Mikrofon verweigert (HTTPS nötig)', true); return; }
  chunks=[]; const mime=pickMime();
  try{ rec = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream); }catch(e){ rec=new MediaRecorder(stream); }
  rec.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  rec.onstop=upload; rec.start();
  recording=true; miccard.classList.add('rec'); miclabel.innerHTML='<b>Höre zu…</b> tippen zum Stoppen';
  try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=64; audioCtx.createMediaStreamSource(stream).connect(analyser); levelLoop(); }catch(e){}
  try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
}
function stopRec(){
  if(rec&&rec.state==='recording') rec.stop();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  cancelAnimationFrame(raf); analyser=null; if(audioCtx)audioCtx.close().catch(()=>{}); audioCtx=null;
  bars.forEach(b=>{ b.style.transform=''; b.style.opacity=''; });
  recording=false; miccard.classList.remove('rec');
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
}
async function upload(){
  const mime=(rec&&rec.mimeType)||'audio/webm';
  const blob=new Blob(chunks,{type:mime});
  if(blob.size<1200){ miclabel.innerHTML='<b>Tippen</b> zum Sprechen'; return; }
  miclabel.textContent='transkribiere…';
  const directMode=direct.checked;
  const ext = mime.includes('mp4')||mime.includes('aac')?'m4a':(mime.includes('ogg')?'ogg':'webm');
  const fd=new FormData(); fd.append('audio',blob,'clip.'+ext);
  try{
    const j=await (await api('/transcribe?inject='+(directMode?'1':'0'),{method:'POST',body:fd})).json();
    if(j.empty){ toast('nichts gehört — nochmal'); }
    else if(directMode){ toast(j.sent?'✓ gesendet':(j.backend==='clipboard_fallback'?'⧉ Zwischenablage (kein Terminal vorne)':'nicht gesendet'), !j.sent); }
    else { ta.value = ta.value.trim() ? (ta.value.trim()+' '+j.text) : j.text; toast('+ ergänzt'); }
  }catch(e){ toast('Fehler: '+e.message, true); }
  finally{ miclabel.innerHTML='<b>Tippen</b> zum Sprechen'; }
}
mic.addEventListener('click', ()=>{ recording?stopRec():startRec(); });

/* ---- Textfeld ---- */
$('#send').onclick=async ()=>{
  const t=ta.value.trim(); if(!t){ toast('Feld ist leer'); return; }
  try{
    const j=await (await api('/type',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,send:1})})).json();
    if(j.sent){ toast('✓ gesendet'); ta.value=''; }
    else toast(j.backend==='clipboard_fallback'?'⧉ Zwischenablage (kein Terminal vorne)':'nicht gesendet', true);
  }catch(e){ toast('Fehler: '+e.message, true); }
};
$('#clear').onclick=()=>{ ta.value=''; };

/* ---- Tasten + Navigation ---- */
function flashEl(b){ b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash'); }
document.querySelectorAll('[data-key]').forEach(b=>{
  b.addEventListener('click', async ()=>{
    flashEl(b);
    try{
      const j=await (await api('/key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:b.dataset.key})})).json();
      if(!j.sent) toast(j.error||'kein Terminal vorne', true);
    }catch(e){ toast('Fehler: '+e.message, true); }
  });
});
document.querySelectorAll('[data-act]').forEach(b=>{
  b.addEventListener('click', ()=>{ flashEl(b); cycleWindow(b.dataset.act); });
});
$('#refresh').onclick=loadSessions;

poll(); loadSessions(); setInterval(poll, 3000); setInterval(loadSessions, 3500);
</script>
</body>
</html>
